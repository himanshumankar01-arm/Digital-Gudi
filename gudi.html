<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gudi Padwa</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* FULLSCREEN BACKGROUND IMAGE WITH ANIMATION */
body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    background-color: #000;
}

/* Animated background image (86) */
#bgImage85{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    opacity:0;
    transform: scale(1.2);
    animation: bgFadeZoom 5s ease forwards, bgPan 20s ease-in-out infinite alternate;
}

@keyframes bgFadeZoom{
    0%{ opacity:0; transform: scale(1.3);}
    50%{ opacity:0.6; transform: scale(1.15);}
    100%{ opacity:1; transform: scale(1);}
}

@keyframes bgPan{
    0%{ transform: scale(1) translateX(0px); }
    50%{ transform: scale(1.05) translateX(-20px); }
    100%{ transform: scale(1) translateX(0px); }
}

/* MAIN */
.main{
    display: flex;
    align-items: center;
    justify-content: space-around;
    height: 100vh;
    padding: 20px;
    flex-wrap: wrap;
    opacity:0;
    transition: opacity 1s ease;
    position: relative;
    z-index:1;
}

/* IMAGE */
.img{
    width: 35vw;
    max-width: 500px;
    height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.img img{
    width: 100%;
    opacity: 0;
}

/* IMAGE ANIMATION */
.animate{
    animation: slideZoom 2s ease forwards;
}

@keyframes slideZoom{
    0%{ transform: translateY(150px) scale(0.8); opacity:0; }
    60%{ transform: translateY(-10px) scale(1.1); opacity:1; }
    100%{ transform: translateY(0) scale(1.05); opacity:1; }
}

/* TEXT */
.text{
    color: white;
    max-width: 500px;
    text-align: center;
}

.text h1{
    font-size: 3rem;
    font-weight: bold;
    text-shadow: 
        0 0 10px #ffcc00,
        0 0 20px #ff9900,
        0 0 30px #ff6600;
    animation: glowHeading 2s ease-in-out infinite alternate;
}

/* Glowing heading animation */
@keyframes glowHeading{
    0%{ text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff9900, 0 0 30px #ff6600;}
    50%{ text-shadow: 0 0 20px #ffdd33, 0 0 30px #ffbb00, 0 0 40px #ff8800;}
    100%{ text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff9900, 0 0 30px #ff6600;}
}

/* TYPEWRITER EFFECT */
.typewriter{
    overflow: hidden;
    border-right: 3px solid orange;
    white-space: nowrap;
    width: 0;
}

/* PARAGRAPH ANIMATION */
.text p{
    opacity: 0;
    font-size: 1.2rem;
}

.showPara{
    animation: paraAnim 1.5s ease forwards;
}

@keyframes paraAnim{
    0%{ transform: translateY(40px); opacity:0; }
    100%{ transform: translateY(0); opacity:1; }
}

/* FLOWERS */
.flower{
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear infinite;
    transform: rotate(0deg);
}

@keyframes fall{
    0%{ transform: translateY(-10px) rotate(0deg); opacity:1; }
    100%{ transform: translateY(100vh) rotate(360deg); opacity:0; }
}

/* SPARKLES */
.sparkle{
    position: fixed;
    top: -5px;
    font-size: 15px;
    color: gold;
    animation: sparkleFall linear infinite;
}

@keyframes sparkleFall{
    0%{ transform: translateY(-5px) rotate(0deg); opacity:1; }
    100%{ transform: translateY(100vh) rotate(180deg); opacity:0; }
}

/* BUTTON */
.btn-custom{
    background: #ff3c00;
    color: white;
    border-radius: 30px;
    padding: 10px 25px;
    border: none;
    transition: 0.3s;
}

.btn-custom:hover{
    transform: scale(1.1);
    box-shadow: 0 0 15px #ff3c00;
}

/* RESPONSIVE */
@media(max-width:768px){
    .main{
        flex-direction: column;
        text-align: center;
    }
    .img{
        width: 70vw;
        height: 350px;
    }
    .text h1{
        margin-top: 20px;
        font-size: 2rem;
    }
}
</style>
</head>
<body>

<!-- Animated Background Image -->
<img src="image copy 86.png" id="bgImage85" alt="Background Image">

<div class="main" id="mainContent">

    <!-- IMAGE -->
    <div class="img">
        <img src="image copy 81.png" id="gudiImg">
    </div>

    <!-- TEXT -->
    <div class="text" >
        <h1 id="heading"></h1>
        <p id="para" style="color: #000;">
            नवीन वर्षाच्या या मंगलमय सुरुवातीला,  
            तुमच्या आयुष्यात सुख, समृद्धी, आनंद आणि यशाची भरभराट होवो. 🌸  
            गुढी पाडव्याच्या या शुभदिनी तुमच्या सर्व इच्छा पूर्ण होवोत.
        </p>
        <!-- <button class="btn btn-custom mt-3" onclick="wish()">साजरा करा 🎉</button> -->
    </div>

</div>

<!-- SOUND -->
<audio id="sound" src="https://www.soundjay.com/human/applause-01.mp3"></audio>

<script>
// Elements
let img = document.getElementById("gudiImg");
let heading = document.getElementById("heading");
let para = document.getElementById("para");
let mainContent = document.getElementById("mainContent");

// Show main content after background animation
window.onload = function(){
    setTimeout(()=> mainContent.style.opacity = 1, 1500);

    // IMAGE ANIMATION
    setTimeout(()=> img.classList.add("animate"), 400);

    // TYPEWRITER EFFECT
    let text = "✨ गुढी पाडव्याच्या हार्दिक शुभेच्छा ✨";
    let i = 0;
    function typeEffect(){
        if(i < text.length){
            heading.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 80);
        }
    }
    setTimeout(typeEffect, 2000);

    // SHOW PARAGRAPH AFTER HEADING
    setTimeout(()=> para.classList.add("showPara"), 5000);
}

// FLOWERS
function createFlower(){
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = "🌸";
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (3 + Math.random() * 5) + "s";
    flower.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(flower);
    setTimeout(()=> flower.remove(), 8000);
}
setInterval(createFlower, 300);

// SPARKLES
function createSparkle(){
    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");
    sparkle.innerHTML = "✨";
    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.animationDuration = (2 + Math.random()*4) + "s";
    document.body.appendChild(sparkle);
    setTimeout(()=> sparkle.remove(), 6000);
}
setInterval(createSparkle, 500);

// BUTTON
function wish(){
    document.getElementById("sound").play();
    alert("🌸 गुढी पाडव्याच्या हार्दिक शुभेच्छा! 🎉");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
